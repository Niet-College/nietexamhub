<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NIET Exam Hub - Your Exam Papers Repository</title>
  <meta name="description"
    content="Access, search, and download NIET exam papers and carry-over papers with ease. Fast search, filters, and bulk downloads." />
  <script>
    // GitHub Pages SPA redirect trick
    // Encodes the full URL path + query + hash into a query param,
    // then redirects to the root so index.html (the SPA) can restore it.
    (function () {
      var l = window.location;
      var segmentCount = 0; // 0 = custom domain (no path prefix)
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?p=/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    })();
  </script>
</head>

</html>
